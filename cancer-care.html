<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lantern – Cancer Care</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Figma wireframe: Desktop + Header + Footer (node 51:1626) */
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: #000;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      border: 4px solid #000;
    }

    /* Header */
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 38px;
      border-bottom: 1px solid #000;
      background: #fff;
    }

    .header__logo {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.64px;
      margin: 0;
    }

    .header__nav {
      display: flex;
      align-items: center;
      gap: 60px;
    }

    .header__nav-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: -0.32px;
      color: #000;
      text-decoration: none;
    }

    .header__nav-item:hover {
      text-decoration: underline;
    }

    .header__icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
    }

    /* Main */
    .main {
      flex: 1;
      background: #fff;
      min-height: 60vh;
    }

    /* Footer */
    .footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 51px;
      height: 80px;
      border-top: 1px solid #000;
      background: #fff;
    }

    .footer__link {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.32px;
      color: #000;
      text-decoration: none;
    }

    .footer__link:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 16px;
        padding: 16px;
      }
      .header__nav {
        flex-wrap: wrap;
        gap: 24px;
        justify-content: center;
      }
      .footer {
        flex-direction: column;
        height: auto;
        padding: 24px 16px;
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 class="header__logo">Lantern</h1>
      <nav class="header__nav" aria-label="Main navigation">
        <a href="#" class="header__nav-item">
          Surgery Care
          <span class="header__icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </span>
        </a>
        <a href="#" class="header__nav-item">Cancer Care</a>
        <a href="#" class="header__nav-item">
          Jasmine Lockwood
          <span class="header__icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </span>
        </a>
        <a href="#" class="header__nav-item" aria-label="Mail">
          <span class="header__icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M22 6L12 13 2 6"/>
            </svg>
          </span>
        </a>
      </nav>
    </header>

    <main class="main">
      <!-- Main content placeholder -->
    </main>

    <footer class="footer">
      <a href="#" class="footer__link">Privacy Policy</a>
      <a href="#" class="footer__link">Terms of Use</a>
      <a href="#" class="footer__link">Contact Us</a>
      <a href="#" class="footer__link">Copyright</a>
    </footer>
  </div>
</body>
</html>
